name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install native deps for evdev + sounddevice
        run: |
          sudo apt-get update
          sudo apt-get install -y libevdev-dev portaudio19-dev

      - name: Install Python deps + basedpyright
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt basedpyright

      - name: Run basedpyright
        run: .venv/bin/basedpyright

  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: shellcheck install.sh bin/scribe
